<div class="low-stock-page">
  <mat-card>
    <mat-card-header><mat-card-title>Low Stock Products</mat-card-title></mat-card-header>
    <mat-card-content>
      @if (isLoading()) {
        <div class="loading"><mat-spinner diameter="36"></mat-spinner><span>Loading low stock items...</span></div>
      } @else {
        <table mat-table [dataSource]="items()" class="low-stock-table">
          <ng-container matColumnDef="name"><th mat-header-cell *matHeaderCellDef>Name</th><td mat-cell *matCellDef="let i">{{ i.name }}</td></ng-container>
          <ng-container matColumnDef="sku"><th mat-header-cell *matHeaderCellDef>SKU</th><td mat-cell *matCellDef="let i">{{ i.sku }}</td></ng-container>
          <ng-container matColumnDef="quantity"><th mat-header-cell *matHeaderCellDef>Quantity</th><td mat-cell *matCellDef="let i">{{ i.quantity }}</td></ng-container>
          <ng-container matColumnDef="minQuantity"><th mat-header-cell *matHeaderCellDef>Min Qty</th><td mat-cell *matCellDef="let i">{{ i.minQuantity }}</td></ng-container>
          <ng-container matColumnDef="reorderLevel"><th mat-header-cell *matHeaderCellDef>Reorder</th><td mat-cell *matCellDef="let i">{{ i.reorderLevel }}</td></ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        @if (items().length === 0) {
          <div class="no-data">No low stock products found.</div>
        }
      }
    </mat-card-content>
  </mat-card>
</div>
